<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UniBite - Όλες οι Αγγελίες</title>
    <link rel="stylesheet" href="stl.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ===== CONSUMER PAGE – 3-PANEL LAYOUT ===== */
        .consumer-page-wrapper {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 10px 0 40px 0;
        }
        .consumer-top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .consumer-panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }
        .consumer-panel--full { width: 100%; }
        .consumer-panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        .consumer-panel-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }
        .consumer-panel-header--active   { border-left: 4px solid #16a34a; }
        .consumer-panel-header--exhausted { border-left: 4px solid #94a3b8; }
        .consumer-panel-header--map      { border-left: 4px solid #800020; }
        .consumer-panel-dot {
            width: 10px; height: 10px;
            border-radius: 50%; flex-shrink: 0;
        }
        .consumer-panel-dot--active    { background: #16a34a; }
        .consumer-panel-dot--exhausted { background: #94a3b8; }
        .consumer-panel-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 460px;
            overflow-y: auto;
        }
        .consumer-listing-card {
            display: flex;
            gap: 0;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .consumer-listing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.07);
        }
        .consumer-listing-card.exhausted { opacity: 0.65; filter: grayscale(35%); }
        .consumer-listing-card img {
            width: 88px; height: 88px;
            object-fit: cover; flex-shrink: 0;
        }
        .consumer-listing-info {
            padding: 10px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .consumer-listing-info h4 {
            margin: 0 0 4px 0;
            font-size: 14px; font-weight: 700; color: #1e293b;
        }
        .consumer-listing-info p {
            margin: 0; font-size: 12px;
            color: #64748b; line-height: 1.5;
        }
        .consumer-listing-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px; gap: 8px;
        }
        .consumer-portions-badge {
            font-size: 11px; font-weight: 700;
            padding: 3px 9px; border-radius: 20px;
        }
        .consumer-portions-badge.active-badge   { background: #dcfce7; color: #16a34a; }
        .consumer-portions-badge.exhausted-badge { background: #f1f5f9; color: #94a3b8; }
        .consumer-reserve-btn {
            background: #800020; color: white;
            border: none; padding: 5px 14px;
            border-radius: 8px; font-size: 12px;
            font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .consumer-reserve-btn:hover:not(:disabled) { background: #600018; }
        .consumer-reserve-btn:disabled {
            background: #e2e8f0; color: #94a3b8; cursor: not-allowed;
        }
        .consumer-empty {
            text-align: center; padding: 30px 20px; color: #94a3b8;
        }
        .consumer-empty .empty-emoji { font-size: 32px; margin-bottom: 8px; }
        .consumer-count-badge {
            margin-left: auto;
            background: #e2e8f0;
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .map-hint-text {
            margin-left: auto;
            font-size: 12px;
            color: #94a3b8;
        }
        @media (max-width: 768px) {
            .consumer-top-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="page-consumer" class="app-page">
        <div class="consumer-page-wrapper">
            <div class="consumer-top-row">
                <div class="consumer-panel consumer-panel--glass">
                    <div class="consumer-panel-header consumer-panel-header--active">
                        <span class="consumer-panel-dot consumer-panel-dot--active"></span>
                        <h3>Ενεργές Αγγελίες</h3>
                        <span class="consumer-count-badge" id="activeCount">0</span>
                    </div>
                    <div class="consumer-panel-body" id="activeListingsContainer"></div>
                </div>
                <div class="consumer-panel consumer-panel--glass">
                    <div class="consumer-panel-header consumer-panel-header--exhausted">
                        <span class="consumer-panel-dot consumer-panel-dot--exhausted"></span>
                        <h3>Εξαντλημένες Αγγελίες</h3>
                        <span class="consumer-count-badge" id="exhaustedCount">0</span>
                    </div>
                    <div class="consumer-panel-body" id="exhaustedListingsContainer"></div>
                </div>
            </div>
            <div class="consumer-panel consumer-panel--full consumer-panel--glass">
                <div class="consumer-panel-header consumer-panel-header--map">
                    <span>📍</span>
                    <h3>Προσφερόμενες Μερίδες στον Χάρτη</h3>
                    <span class="map-hint-text">📌 Κλικ σε marker για λεπτομέρειες</span>
                </div>
                <div id="studentMap" style="height:420px;width:100%;border-radius:0 0 20px 20px;"></div>
            </div>
        </div>
    </div>
</body>
</html>
